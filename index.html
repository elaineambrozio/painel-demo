</script>
<style>
:root{color-scheme:light;--teal:#1D6F68;--teal2:#12968C;--amarelo:#D5B669;--bg:#F6F8F4;--card:#FFF;--text:#20302C;--muted:#5F7370;--border:#D8E2DC;--ok:#2D7A4F;--ok-bg:#E8F5EE;--warn:#856404;--warn-bg:#FFF8E1;--danger:#8B1E3F;--danger-bg:#FDE8EF}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}
.hdr{background:linear-gradient(120deg,#175E58 0%,var(--teal) 55%,#26857C 100%);color:#fff;padding:16px 26px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.hdr-l{display:flex;align-items:center;gap:16px}
.hdr-l img{height:36px;display:block;filter:drop-shadow(0 1px 2px rgba(0,0,0,.15))}
.hdr-div{width:1px;height:38px;background:rgba(255,255,255,.28)}
.hdr-eyebrow{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.85)}
.hdr-sub{font-size:11px;opacity:.7;margin-top:3px}
.hdr-stats{display:flex;gap:30px;align-items:center;margin:0 auto;padding:0 18px}
.hstat{text-align:center}
.hstat-v{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.15}
.hstat-l{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.6);margin-top:2px}
.hstat+.hstat{border-left:1px solid rgba(255,255,255,.18);padding-left:30px}
@media(max-width:900px){.hdr-stats{display:none}}
.badge-par{background:var(--amarelo);color:#20302C;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
.selmes{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:13px;font-weight:600;padding:6px 10px;border-radius:8px;cursor:pointer}
.selmes option{color:#20302C}
.semana-bar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:6px;overflow-x:auto}
.stab{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid var(--teal);color:var(--teal);background:transparent;white-space:nowrap}
.stab.active{background:var(--teal);color:#fff}
.stab-sub{font-size:9px;font-weight:400;display:block}
.tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;overflow-x:auto}
.tab{padding:11px 15px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;color:var(--muted);white-space:nowrap;user-select:none}
.tab:hover{color:var(--teal)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:600}
.content{padding:16px 20px;max-width:1100px;margin:0 auto}
.panel{display:none}.panel.active{display:block}
.banner{border-radius:8px;padding:9px 14px;font-size:12px;margin-bottom:14px;line-height:1.5}
.banner-warn{background:var(--warn-bg);border:1px solid #E0C040;color:var(--warn)}
.banner-ok{background:var(--ok-bg);border:1px solid #4CAF50;color:var(--ok)}
.banner-info{background:#e3f2fd;border:1px solid #90caf9;color:#1565c0}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
.kpi.hi{background:var(--teal);border-color:var(--teal)}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px}
.kpi.hi .kpi-label{color:rgba(255,255,255,.7)}
.kpi-val{font-size:19px;font-weight:700;color:var(--teal);font-variant-numeric:tabular-nums}
.kpi.hi .kpi-val{color:#fff}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}
.kpi.hi .kpi-sub{color:rgba(255,255,255,.65)}
.prog-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.prog-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-title{font-size:13px;font-weight:600}
.prog-pct{font-size:22px;font-weight:700;color:var(--teal)}
.prog-bg{height:11px;background:#DCE8E2;border-radius:6px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal),#33A296);border-radius:6px;width:0%;transition:width .8s ease}
.prog-details{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--muted);flex-wrap:wrap;gap:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 15px;margin-bottom:14px;overflow-x:auto}
.card-title{font-size:13px;font-weight:600;margin-bottom:11px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.two-col{grid-template-columns:1fr}}
.chart-box{position:relative}.chart-box.h200{height:200px}.chart-box.h260{height:260px}.chart-box.h300{height:300px}.chart-box.h180{height:180px}
.ptable{width:100%;border-collapse:collapse;font-size:12px}
.ptable th{background:var(--teal);color:#fff;padding:8px 10px;text-align:left;font-size:11px;font-weight:600;white-space:nowrap}
.ptable th:not(:first-child){text-align:right}
.ptable td{padding:7px 10px;border-bottom:1px solid #E4EDE7;white-space:nowrap}
.ptable td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
.ptable tr:nth-child(even) td{background:#F3F7F5}
.tot-row td{font-weight:700;background:#E1EBE6!important}
.mbar-wrap{background:#DCE8E2;height:5px;border-radius:3px;display:inline-block;vertical-align:middle;width:70px;margin-left:6px}
.mbar{height:100%;border-radius:3px;display:block;max-width:100%}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.bg{background:var(--ok-bg);color:var(--ok)}.by{background:var(--warn-bg);color:var(--warn)}.br{background:var(--danger-bg);color:var(--danger)}.bgray{background:#EDF0EE;color:#888}
.pay-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.pay-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.pay-name{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase}
.pay-val{font-size:15px;font-weight:700;color:var(--teal);margin-top:3px}
.pay-pct{font-size:11px;color:var(--muted)}
.alerts{display:flex;flex-direction:column;gap:8px}
.alert{padding:9px 12px;border-radius:8px;font-size:12px;line-height:1.5;display:flex;gap:8px}
.al-g{background:var(--ok-bg);border-left:3px solid var(--ok)}
.al-w{background:var(--warn-bg);border-left:3px solid #f9a825}
.al-b{background:#e3f2fd;border-left:3px solid #1565c0}
.al-r{background:#fff0f0;border-left:3px solid #e53935}
.al-ic{font-size:14px;flex-shrink:0;margin-top:1px}
.conc-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.ck{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.ck.ck-ok{border-color:#4CAF50;background:#f0faf0}
.ck.ck-in{border-color:#42a5f5;background:#e8f4ff}
.ck.ck-out{border-color:#ef9a9a;background:#fff5f5}
.ck-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:3px}
.ck-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.ck-sub{font-size:10px;color:var(--muted);margin-top:2px}
.dre{width:100%;border-collapse:collapse;font-size:13px}
.dre td{padding:7px 12px;border-bottom:1px solid #E4EDE7}
.dre td:last-child{text-align:right;font-weight:500;white-space:nowrap;font-variant-numeric:tabular-nums}
.dre .sec td{background:var(--teal);color:#fff;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.dre .tot td{font-weight:700;background:#EDF4F0}
.dre .res td{font-weight:700;background:var(--teal);color:#fff;font-size:13px}
.neg{color:#C0392B}
.cmp-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);gap:8px;font-size:13px}
.cmp-row.hd{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border);padding-bottom:6px}
.cmp-row.tot-c{font-weight:700;border-top:2px solid var(--border);padding-top:8px;border-bottom:none}
.vs{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap}
.vs-u{background:#e8f5e9;color:#2a7d3a}.vs-d{background:#fff3e0;color:#e65100}.vs-e{background:#f5f5f5;color:#888}
.rodape{font-size:10px;color:var(--muted);text-align:center;padding:14px 0 20px}
.btn-print{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px}
.btn-xls{background:#1B7A3D;color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;float:right;margin-top:-2px}
.btn-xls:hover{background:#166132}
.sec-hdr{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--teal);border-bottom:2px solid var(--amarelo);padding-bottom:5px;margin:18px 0 12px}
.cardc{padding:0}
.cardc .card-head{display:flex;align-items:center;gap:9px;padding:12px 15px;cursor:pointer;user-select:none}
.cardc .card-head:hover{background:#F3F7F5}
.cardc .cardc-title{font-size:13px;font-weight:600;flex:1}
.cardc .chev{color:var(--teal);font-size:12px;transition:transform .15s;flex-shrink:0}
.cardc.card-open .chev{transform:rotate(90deg)}
.cardc .card-head .btn-xls{float:none;margin:0}
.cardc .card-body{display:none;padding:0 15px 14px;overflow-x:auto}
.cardc.card-open .card-body{display:block}
.print-only{display:none}
@media print{
  @page{margin:12mm 11mm}
  .hdr,.semana-bar,.tabs,.rodape,.btn-print,.btn-xls,.noprint,.banner-info,.cardc .chev{display:none!important}
  .cardc .card-body{display:block!important}
  body{background:#fff}
  .content{max-width:none;padding:0}
  .card{break-inside:auto;overflow:visible;border:none;padding:0 0 6mm;margin-bottom:2mm}
  .card-title{color:#1D6F68;font-size:12pt;border-bottom:2px solid #D5B669;padding-bottom:2mm;break-after:avoid}
  table{font-size:8.5pt}
  tr{break-inside:avoid}
  thead{display:table-header-group}
  .tot-row td{background:#E1EBE6!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ptable th{background:#1D6F68!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .print-only{display:flex!important;align-items:flex-end;justify-content:space-between;border-bottom:2.5px solid #1D6F68;padding-bottom:4mm;margin-bottom:6mm}
  .print-only img{height:11mm}
  .print-tit{text-align:right}
  .print-tit .pt1{font-size:8pt;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#5F7370}
  .print-tit .pt2{font-size:15pt;font-weight:700;color:#1D6F68}
  .print-tit .pt3{font-size:8pt;color:#8B9A94;margin-top:1mm}
}
/* Mobile */
@media(max-width:640px){
  .content{padding:10px 8px}
  .hdr{padding:12px 14px}
  .hdr-l{gap:10px}
  .hdr-l img{height:24px}
  .hdr-div{height:26px}
  .hdr-eyebrow{font-size:8.5px;letter-spacing:1.8px}
  .kpis{grid-template-columns:1fr 1fr}
  .kpi-val{font-size:16px}
  .tab{padding:9px 10px;font-size:12px}
  .chart-box.h300{height:240px}.chart-box.h260{height:210px}
}
</style>

    kpis += kpi('Faturamento Real', brl(k.real||tot), 'mês fechado', true);

    kpis += kpi('Resultado Operacional', brl(k.resultado||0), (k.resultado_pct||'')+' margem', true);
    kpis += kpi('Melhor dia', k.melhor_dia||'-', k.melhor_dia_val?brl(k.melhor_dia_val):'');
  } else {
    kpis += kpi('Faturamento Tabela', brl(k.tabela||0), dias.length+' dias · '+atend+' comandas');
    kpis += kpi('Real Estimado', brl(k.real||0), 'excl. permuta '+brl(k.permuta||0)+' + desc. '+brl(k.desc||0));
    kpis += kpi('Projeção do Mês', brl(k.proj||0), k.dias_uteis+' dias úteis', true);
    kpis += kpi('Atendimentos', atend, 'ticket médio '+brl(k.ticket||0));
    if(k.saldo_bb) kpis += kpi('Saldo BB', brl(k.saldo_bb), 'em '+k.saldo_bb_data);
    if(m.conc) kpis += kpi('Conciliação', m.conc.pix_ok+'/'+m.conc.pix.length+' Pix ✓', m.conc.pix_alerta>0 ? m.conc.pix_alerta+' para verificar' : 'tudo conferido', true);
  }
  var html = '<div class="kpis">'+kpis+'</div>';
  if(m.tipo!=='historico' && !m.fechado && !semSel && m.prev_real){
    var alvo = k.meta_mes || m.prev_real;
    var alvoLbl = k.meta_mes ? 'Meta do mês ('+esc(m.prev_label)+' '+(k.meta_pct_lbl||'+10%')+')' : esc(m.prev_label)+' real';
    var pct = (k.proj/alvo*100).toFixed(1);
    html += '<div class="prog-wrap"><div class="prog-hdr"><span class="prog-title">&#127919; Projeção vs '+alvoLbl+'</span><span class="prog-pct">'+pct.replace('.',',')+'%</span></div>'
         + '<div class="prog-bg"><div class="prog-fill" id="pfill"></div></div>'
         + '<div class="prog-details"><span>Realizado: <strong>'+brl(k.real)+'</strong></span><span>Projeção: <strong>'+brl(k.proj)+'</strong></span>'
         + (k.meta_mes?'<span>Meta: <strong>'+brl(k.meta_mes)+'</strong></span>':'')
         + '<span>'+esc(m.prev_label)+': <strong>'+brl(m.prev_real)+'</strong></span></div></div>';
  }
  html += '<div class="two-col">'
       + '<div class="card"><div class="card-title">Top Profissionais</div><div class="chart-box h200"><canvas id="c-top"></canvas></div></div>'
       + '<div class="card"><div class="card-title">Formas de Pagamento (mês)</div><div class="chart-box h200"><canvas id="c-donut"></canvas></div></div></div>';
  html += '<div class="card"><div class="card-title">Destaques</div><div class="alerts">'+(m.alertas||[]).map(function(a){
    return '<div class="alert al-'+a[0]+'"><span class="al-ic">'+a[1]+'</span><span>'+a[2]+'</span></div>';}).join('')+'</div></div>';

    datasets:[{data:profs.map(function(p){return p.tot;}),backgroundColor:'#12968C',borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return brl(c.raw);}}}},scales:eixos(true)}});
  var pg = m.pgto||{}, keys = Object.keys(pg), tot2 = keys.reduce(function(a,x){return a+pg[x];},0);
  grafico('c-donut', {type:'doughnut', data:{labels:keys, datasets:[{data:keys.map(function(x){return pg[x];}),backgroundColor:CORES,borderWidth:2,borderColor:'#F6F8F4'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:11}},
      tooltip:{callbacks:{label:function(c){return c.label+': '+brl(c.raw)+' ('+(c.raw/tot2*100).toFixed(1)+'%)';}}}}}});

function kpi(lbl,val,sub,hi){ return '<div class="kpi'+(hi?' hi':'')+'"><div class="kpi-label">'+lbl+'</div><div class="kpi-val">'+val+'</div><div class="kpi-sub">'+sub+'</div></div>'; }
function topProfs(n){
  var m = M(), dias = diasFiltrados().map(function(d){return d.d;});
  return (m.profs||[]).map(function(p){
    var t = p.dias ? dias.reduce(function(a,dd){return a+(p.dias[dd]||0);},0) : p.total;
    return {nome:p.nome, tot:t};
  }).filter(function(p){return p.tot>0;}).sort(function(a,b){return b.tot-a.tot;}).slice(0,n);
}

function rProf(){
  var m = M(), el = document.getElementById('tab-profissionais');
  var dias = diasFiltrados().map(function(d){return d.d;});
  var html = '<div class="card"><div class="card-title">Faturamento por Profissional'+(semSel?' — Semana '+semSel:'')+'</div><div class="chart-box h300"><canvas id="c-prof"></canvas></div></div>';
  if(m.tipo==='historico'){
    html += '<div class="card"><div class="card-title">Desempenho — '+esc(m.label)+'</div><table class="ptable"><thead><tr><th>Profissional</th><th>Atendimentos</th><th>Faturamento</th><th>Ticket Médio</th></tr></thead><tbody>'
      + m.profs.map(function(p){return '<tr><td><strong>'+esc(p.nome)+'</strong></td><td>'+p.atend+'</td><td>'+brl(p.total)+'</td><td>'+brl(p.ticket)+'</td></tr>';}).join('')
      + '</tbody></table></div>';
  } else {
    var ths = dias.map(function(d){return '<th>'+d+'</th>';}).join('');
    var linhas = m.profs.slice().map(function(p){
      var tot = dias.reduce(function(a,d){return a+(p.dias[d]||0);},0);
      return {p:p, tot:tot};
    }).sort(function(a,b){return b.tot-a.tot;}).map(function(x){
      var p = x.p, cells = dias.map(function(d){return '<td>'+(p.dias[d]?brl(p.dias[d]):'&mdash;')+'</td>';}).join('');
      var proj = Math.round(x.tot/Math.max(dias.length,1)*(semSel?dias.length:(m.kpis.dias_uteis||23)));
      var stat = !p.meta ? '<span class="badge bgray">Sem meta</span>'
        : (proj>=p.meta ? '<span class="badge bg">&#9650; '+Math.round(proj/p.meta*100)+'%</span>'
        : proj>=p.meta*0.8 ? '<span class="badge by">~'+Math.round(proj/p.meta*100)+'%</span>'
        : '<span class="badge br">&#9660; '+Math.round(proj/p.meta*100)+'%</span>');
      var bw = p.meta?Math.min(proj/p.meta*100,100):0;
      var bc = p.meta?(proj>=p.meta?'#2D7A4F':proj>=p.meta*0.8?'#A8821A':'#C0392B'):'#ccc';
      return '<tr><td><strong>'+esc(p.nome)+'</strong></td>'+cells
        +'<td style="font-weight:700">'+brl(x.tot)+'</td>'
        +(semSel?'':'<td style="text-align:left"><span class="mbar-wrap"><span class="mbar" style="width:'+bw+'%;background:'+bc+'"></span></span><small style="margin-left:4px;color:'+bc+'">'+brl(proj)+'</small></td>')
        +'<td>'+(p.prev?brl(p.prev):'&mdash;')+'</td>'
        +(semSel?'':'<td>'+stat+'</td>')+'</tr>';
    }).join('');
    html += '<div class="card"><div class="card-title">Desempenho Individual</div><table class="ptable"><thead><tr><th>Profissional</th>'+ths+'<th>Total</th>'+(semSel?'':'<th style="text-align:left;padding-left:14px">Projeção</th>')+'<th>'+esc(m.prev_label||'Mês ant.')+'</th>'+(semSel?'':'<th>Status</th>')+'</tr></thead><tbody>'+linhas+'</tbody></table></div>';
  }
  // Comissões a pagar no fechamento (informação de gestão — dia 1–2)
  var cf = (m.contab && m.contab.comissoes_fechamento) || [];
  if(cf.length){
    var fn = 0, fo = 0, ff = 0;
    html += '<div class="card"><button class="btn-xls" onclick="expContab(\'comissfech\')">&#11015;&#65039; Baixar Excel</button>'
      + '<div class="card-title">&#128176; Comissões a pagar no fechamento ('+esc(m.label)+')</div>'
      + '<div style="font-size:11px;color:var(--muted);margin:-4px 0 10px">O que cada profissional recebe no dia 1–2 = líquido da nota (rateio − produtos) − adiantamentos/vales já pagos no mês, MEI e dívidas.</div>'
      + '<table class="ptable"><thead><tr><th style="text-align:left">Profissional</th><th>Líquido nota</th><th>(−) Adiant. e acertos</th><th>A pagar no fechamento</th></tr></thead><tbody>'
      + cf.map(function(r){ fn += r[1]; fo += r[2]; ff += r[3];
          return '<tr><td style="text-align:left">'+esc(r[0])+'</td><td>'+brl2(r[1])+'</td><td>'+(r[2]?(r[2]<0?'('+brl2(Math.abs(r[2]))+')':brl2(r[2])):'—')+'</td><td><strong>'+brl2(r[3])+'</strong></td></tr>'; }).join('')
      + '<tr class="tot-row"><td style="text-align:left">TOTAL A PAGAR</td><td>'+brl2(fn)+'</td><td>'+(fo<0?'('+brl2(Math.abs(fo))+')':brl2(fo))+'</td><td>'+brl2(ff)+'</td></tr></tbody></table></div>';
  } else if(m.tipo==='detalhado' && !m.fechado){
    html += '<div class="card"><div class="card-title">&#128176; Comissões a pagar no fechamento</div>'
      + '<div style="font-size:12px;color:var(--muted)">As comissões de <b>'+esc(m.label)+'</b> são calculadas no <b>fechamento do mês</b> (tela oficial do AVEC, dia 1–2 do mês seguinte). Este quadro aparece preenchido assim que o mês fecha. Para ver um mês já fechado, selecione-o no seletor de mês (ex.: Junho).</div></div>';
  }

  el.innerHTML = html;
  var ps = topProfs(99);
  var dsets = [{label:semSel?'Semana '+semSel:'Realizado', data:ps.map(function(p){return p.tot;}), backgroundColor:'#12968C', borderRadius:4}];
  if(m.tipo!=='historico' && !semSel){
    var prevMap = {}; (m.profs||[]).forEach(function(p){ prevMap[p.nome]=p.prev||0; });
    dsets.push({label:esc(m.prev_label||'Anterior'), data:ps.map(function(p){return prevMap[p.nome]||0;}), backgroundColor:'rgba(168,130,26,0.5)', borderRadius:4});
  }
  grafico('c-prof', {type:'bar', data:{labels:ps.map(function(p){return p.nome;}), datasets:dsets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+brl(c.raw);}}}},scales:eixos(true)}});
}

// ---- gerador de XLSX nativo (sem biblioteca externa; painel bloqueia CDN) ----
var _crc;
function crc32(b){
  if(!_crc){ _crc=[]; for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);_crc[n]=c>>>0;} }
  var crc=0xFFFFFFFF;
  for(var i=0;i<b.length;i++) crc=_crc[(crc^b[i])&0xFF]^(crc>>>8);
  return (crc^0xFFFFFFFF)>>>0;
}
function colRef(i){ var s=''; i++; while(i){var m=(i-1)%26; s=String.fromCharCode(65+m)+s; i=Math.floor((i-1)/26);} return s; }
function xEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function sheetXML(headers, linhas){
  var rows='', todas=[headers].concat(linhas);
  for(var r=0;r<todas.length;r++){
    var cs='';
    for(var cIdx=0;cIdx<todas[r].length;cIdx++){
      var v=todas[r][cIdx], ref=colRef(cIdx)+(r+1);
      if(typeof v==='number' && isFinite(v)) cs+='<c r="'+ref+'"><v>'+(Math.round(v*100)/100)+'</v></c>';
      else cs+='<c r="'+ref+'" t="inlineStr"><is><t xml:space="preserve">'+xEsc(v==null?'':v)+'</t></is></c>';
    }
    rows+='<row r="'+(r+1)+'">'+cs+'</row>';
  }
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>'+rows+'</sheetData></worksheet>';
}
function zipStore(files){
  var enc=new TextEncoder(), partes=[], central=[], off=0;
  function u16(n){return [n&255,(n>>8)&255];}
  function u32(n){return [n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];}
  files.forEach(function(f){
    var nm=enc.encode(f.name), dt=(typeof f.data==='string')?enc.encode(f.data):f.data, crc=crc32(dt);
    var lh=[0x50,0x4b,0x03,0x04].concat(u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(dt.length),u32(dt.length),u16(nm.length),u16(0));
    partes.push(new Uint8Array(lh),nm,dt);
    central.push({nm:nm,crc:crc,len:dt.length,off:off});
    off+=lh.length+nm.length+dt.length;
  });
  var cdStart=off, cd=[];
  central.forEach(function(c){
    var h=[0x50,0x4b,0x01,0x02].concat(u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(c.crc),u32(c.len),u32(c.len),u16(c.nm.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(c.off));
    cd.push(new Uint8Array(h),c.nm); off+=h.length+c.nm.length;
  });
  var eocd=[0x50,0x4b,0x05,0x06].concat(u16(0),u16(0),u16(central.length),u16(central.length),u32(off-cdStart),u32(cdStart),u16(0));
  var all=partes.concat(cd,[new Uint8Array(eocd)]);
  var tot=all.reduce(function(a,x){return a+x.length;},0), out=new Uint8Array(tot), p=0;
  all.forEach(function(x){out.set(x,p);p+=x.length;});
  return out;
}
function baixarXLSX(nome, headers, linhas){
  var ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>';
  var rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
  var wb='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Dados" sheetId="1" r:id="rId1"/></sheets></workbook>';
  var wbr='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>';
  var zip=zipStore([
    {name:'[Content_Types].xml',data:ct},
    {name:'_rels/.rels',data:rels},
    {name:'xl/workbook.xml',data:wb},
    {name:'xl/_rels/workbook.xml.rels',data:wbr},
    {name:'xl/worksheets/sheet1.xml',data:sheetXML(headers,linhas)}
  ]);
  var blob=new Blob([zip],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=nome+'.xlsx';
  document.body.appendChild(a); a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href);},120);
}
function expContab(tipo){
  var m=M(), c=m.contab, mes=mesSel;
  if(tipo==='saidas') baixarXLSX('saidas_bancarias_'+mes, ['Data (banco)','Categoria','Descrição (banco)','Título / Obs. (AVEC)','Valor (saída)'],
    c.saidas_banco.map(function(r){return [r[0],r[1],r[2],r[3],Math.abs(r[4])];}));
  else if(tipo==='pix') baixarXLSX('pix_recebidos_'+mes, ['Data','Pagador','Valor'],
    c.pix_lista.map(function(r){return [r[0],r[1],r[2]];}));
  else if(tipo==='comiss') baixarXLSX('comissoes_nota_servico_'+mes, ['Profissional','Rateio bruto','Desconto (produtos)','Líquido (nota)'],
    c.comissoes.map(function(r){return [r[0],r[1],r[2],r[3]];}));
  else if(tipo==='comissfech') baixarXLSX('comissoes_a_pagar_fechamento_'+mes, ['Profissional','Líquido nota','Adiantamentos e acertos','A pagar no fechamento'],
    c.comissoes_fechamento.map(function(r){return [r[0],r[1],r[2],r[3]];}));
  else if(tipo==='cielo'){ var ci=m.cielo; if(ci) baixarXLSX('maquineta_cielo_'+mes, ['Bandeira','Vendas','Bruto','Líquido'],
    ci.bandeiras.map(function(b){return [b[0],b[1],b[2],b[3]];})); }
  else if(tipo==='comisspagas') baixarXLSX('comissoes_pagas_'+mes, ['Data pagamento','Descrição (AVEC)','Valor'],
    c.comissoes_pagas.map(function(r){return [r[0],r[1],Math.abs(r[2])];}));
}
function toggleCard(head){ head.parentNode.classList.toggle('card-open'); }
function cardCol(titulo, tipoExp, corpo){
  var btn = tipoExp ? '<button class="btn-xls" onclick="event.stopPropagation();expContab(\''+tipoExp+'\')">&#11015;&#65039; Baixar Excel</button>' : '';
  return '<div class="card cardc"><div class="card-head" onclick="toggleCard(this)"><span class="chev">&#9656;</span>'
    + '<span class="cardc-title">'+titulo+'</span>'+btn+'</div><div class="card-body">'+corpo+'</div></div>';
}
function rContab(){
  var m = M(), el = document.getElementById('tab-contab');
  var c = m.contab, ci = m.cielo;
  var temAlgo = c && ((c.saidas_banco&&c.saidas_banco.length)
    ||(c.comissoes&&c.comissoes.length)||(c.pix_lista&&c.pix_lista.length));
  if(!temAlgo){
    el.innerHTML = '<div class="banner banner-info">&#9432; Sem lançamentos contábeis detalhados para '+esc(m.label)+'.</div>';
    return;
  }
  var html = '<button class="btn-print" onclick="window.print()">&#128424; Salvar esta aba em PDF</button>'
    + '<div class="banner banner-info">&#129534; <b>Pacote da Contabilidade</b> &middot; '+esc(m.label)+'. Toque num quadro para abrir; cada um tem <b>Baixar Excel</b>. Em "Salvar esta aba em PDF" todos abrem automaticamente. Fontes: extrato BB, Cielo, AVEC e tela de comissões.</div>';

  // resumo dos numeros-chave
  html += '<div class="kpis">'
    + kpi('PIX recebidos no mês', brl2(c.tot_pix||0), (c.pix_lista?c.pix_lista.length:0)+' lançamentos')
    + (ci ? kpi('Maquineta (Cielo)', brl2(ci.bruto), 'bruto · líq '+brl2(ci.liquido)) : '')
    + kpi('Comissões líquidas', brl2(c.tot_comissoes_liq||0), 'p/ nota de serviço', true)
    + kpi('Saídas bancárias', brl2(Math.abs(c.tot_saidas_banco||0)), (c.saidas_banco?c.saidas_banco.length:0)+' lançamentos')
    + '</div>';

  // ===================== CONTÁBIL =====================
  html += '<div class="sec-hdr">&#128202; Contábil</div>';

  // 1-2) Saídas bancárias em ordem cronológica (banco) + descrição do AVEC
  if(c.saidas_banco && c.saidas_banco.length){
    var comAvec = c.saidas_banco.filter(function(r){return r[3];}).length;
    var corpo = '<div style="font-size:11px;color:var(--muted);margin:0 0 10px">'
      + '<span style="color:#1565c0">&#9632;</span> <b>Data</b>, <b>Descrição</b> e <b>Valor</b> vêm do <b>extrato do Banco do Brasil</b>. '
      + '<span style="color:#1B7A3D">&#9632;</span> <b>Título / Obs.</b> é o lançamento correspondente no <b>AVEC</b>, casado com segurança por valor + data ('+comAvec+' de '+c.saidas_banco.length+'). Fica em branco quando não há casamento confiável — ex.: tarifas bancárias, ou lançamentos que o AVEC agrupou/registrou em data diferente.</div>'
      + '<table class="ptable"><thead><tr><th>Data <small>(banco)</small></th><th style="text-align:left">Categoria</th><th style="text-align:left">Descrição <small>(banco)</small></th><th style="text-align:left">Título / Obs. <small>(AVEC)</small></th><th>Valor <small>(banco)</small></th></tr></thead><tbody>'
      + c.saidas_banco.map(function(r){return '<tr><td>'+esc(r[0])+'</td><td style="text-align:left">'+esc(r[1])+'</td><td style="text-align:left">'+esc(r[2])+'</td><td style="text-align:left">'+(r[3]?esc(r[3]):'<span style="color:#bbb">—</span>')+'</td><td class="neg">('+brl2(Math.abs(r[4]))+')</td></tr>';}).join('')
      + '<tr class="tot-row"><td colspan="4" style="text-align:right">TOTAL DE SAÍDAS BANCÁRIAS</td><td>('+brl2(Math.abs(c.tot_saidas_banco))+')</td></tr></tbody></table>';
    html += cardCol('Saídas bancárias — ordem cronológica ('+c.saidas_banco.length+' lançamentos)', 'saidas', corpo);
  }

  // Comissões e salários PAGOS no mês (lançamentos AVEC) — no lugar do caixa físico
  if(c.comissoes_pagas && c.comissoes_pagas.length){
    var corpo = '<div style="font-size:11px;color:var(--muted);margin:0 0 10px">Comissões e salários efetivamente <b>pagos</b> no mês (lançamentos do AVEC). Diferente do card <b>"líquido para nota de serviço"</b>, que é o <b>cálculo</b> do mês corrente a pagar.</div>'
      + '<table class="ptable"><thead><tr><th>Data pgto</th><th style="text-align:left">Descrição (AVEC)</th><th>Valor</th></tr></thead><tbody>'
      + c.comissoes_pagas.map(function(r){return '<tr><td>'+esc(r[0])+'</td><td style="text-align:left">'+esc(r[1])+'</td><td class="neg">('+brl2(Math.abs(r[2]))+')</td></tr>';}).join('')
      + '<tr class="tot-row"><td colspan="2" style="text-align:right">TOTAL PAGO NO MÊS</td><td>('+brl2(Math.abs(c.tot_comissoes_pagas))+')</td></tr></tbody></table>';
    html += cardCol('Comissões e salários pagos no mês (lançamentos AVEC)', 'comisspagas', corpo);
  }

  // 3) Extratos bancários OFX/PDF — card FIXO (nao recolhivel), botao sempre visivel
  if(BASE.extratos_url){
    html += '<div class="card cardc"><div class="card-head" style="cursor:default">'
      + '<span class="cardc-title">Extratos bancários (OFX / PDF)</span>'
      + '<a href="'+BASE.extratos_url+'" target="_blank" rel="noopener" class="btn-xls" style="float:none;margin:0;display:inline-block;text-decoration:none">&#128193; Abrir pasta no Drive</a>'
      + '</div></div>';
  } else {
    html += '<div class="card"><div class="card-title">Extratos bancários (OFX / PDF)</div>'
      + '<div style="font-size:12px;color:var(--muted)">Pasta de extratos ainda não configurada. Os arquivos OFX do mês ficam no Drive do salão (Seu Salão › extrato-bb). Cadastre a URL da pasta em config_turali.json &rarr; contabilidade.extratos_drive_url.</div></div>';
  }

  // ===================== FISCAL =====================
  html += '<div class="sec-hdr">&#129534; Fiscal</div>';

  // 4) Maquineta (Cielo)
  if(ci){
    var corpo = '<div class="conc-kpis">'
      + ck('Vendas', ci.qtd, 'transações aprovadas', '')
      + ck('Bruto', brl2(ci.bruto), 'capturado no mês', ' ck-in')
      + ck('Taxas', brl2(ci.taxa), 'média '+String(ci.taxa_media).replace('.',',')+'%', ' ck-out')
      + ck('Líquido', brl2(ci.liquido), 'a receber da Cielo', ' ck-ok')
      + '</div>'
      + '<table class="ptable"><thead><tr><th style="text-align:left">Bandeira</th><th>Vendas</th><th>Bruto</th><th>Líquido</th></tr></thead><tbody>'
      + ci.bandeiras.map(function(b){return '<tr><td style="text-align:left">'+esc(b[0])+'</td><td>'+b[1]+'</td><td>'+brl2(b[2])+'</td><td>'+brl2(b[3])+'</td></tr>';}).join('')
      + '<tr class="tot-row"><td>TOTAL</td><td>'+ci.qtd+'</td><td>'+brl2(ci.bruto)+'</td><td>'+brl2(ci.liquido)+'</td></tr></tbody></table>';
    html += cardCol('Maquineta (Cielo) — '+esc(m.label), 'cielo', corpo);
  }

  // 5) PIX recebidos no mês
  if(c.pix_lista && c.pix_lista.length){
    var corpo = '<table class="ptable"><thead><tr><th>Data</th><th style="text-align:left">Pagador</th><th>Valor</th></tr></thead><tbody>'
      + c.pix_lista.map(function(r){return '<tr><td>'+esc(r[0])+'</td><td style="text-align:left">'+esc(r[1])+'</td><td style="color:#2D7A4F;font-weight:600">'+brl2(r[2])+'</td></tr>';}).join('')
      + '<tr class="tot-row"><td colspan="2" style="text-align:right">TOTAL PIX RECEBIDO</td><td>'+brl2(c.tot_pix)+'</td></tr></tbody></table>';
    html += cardCol('PIX recebidos no mês — total '+brl2(c.tot_pix)+' ('+c.pix_lista.length+' lançamentos)', 'pix', corpo);
  }

  // 6) Comissões líquidas para nota de serviço
  if(c.comissoes && c.comissoes.length){
    var tr_ = 0, td_ = 0, tt_ = 0;
    var corpo = '<div style="font-size:11px;color:var(--muted);margin:0 0 10px">Comissão para a nota de serviço = <b>rateio &minus; produtos</b>. Só os <b>gastos com produtos</b> são descontados; <b>vales/adiantamentos</b> não (são antecipação da própria comissão) e <b>MEI/dívidas</b> são acertos financeiros à parte.</div>'
      + '<table class="ptable"><thead><tr><th style="text-align:left">Profissional</th><th>Rateio bruto</th><th>Desconto (produtos)</th><th>Líquido (nota)</th></tr></thead><tbody>'
      + c.comissoes.map(function(r){ tr_ += r[1]; td_ += r[2]; tt_ += r[3];
          return '<tr><td style="text-align:left">'+esc(r[0])+'</td><td>'+brl2(r[1])+'</td><td>'+(r[2]?'('+brl2(Math.abs(r[2]))+')':'—')+'</td><td><strong>'+brl2(r[3])+'</strong></td></tr>'; }).join('')
      + '<tr class="tot-row"><td style="text-align:left">TOTAL LÍQUIDO (nota de serviço)</td><td>'+brl2(tr_)+'</td><td>('+brl2(Math.abs(td_))+')</td><td>'+brl2(tt_)+'</td></tr></tbody></table>';
    html += cardCol('Comissões — líquido para nota de serviço ('+esc(m.label)+')', 'comiss', corpo);
  }

  el.innerHTML = html;
}

// ---------- init ----------
montaTopo(); montaSemanas(); render();
</script>
